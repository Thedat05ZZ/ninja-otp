<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja ViOTP - Fixed 100%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .btn-press:active { transform: scale(0.96); }
        .ninja-card { background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4 sm:p-8 font-sans">
    <div class="max-w-md mx-auto space-y-5">
        <h1 class="text-3xl font-black text-center text-yellow-500 tracking-tighter uppercase">Ninja ViOTP Pro</h1>
        <div class="ninja-card p-5 rounded-2xl shadow-xl">
            <div class="flex justify-between items-center mb-3">
                <label class="text-xs font-bold text-slate-400 uppercase">Token & Số dư</label>
                <span id="balanceText" class="text-green-400 font-bold">VND 0</span>
            </div>
            <input type="password" id="apiToken" onchange="initApi()" placeholder="Nhập Token..." 
                   class="w-full bg-slate-900 border-none rounded-xl p-3 text-sm ring-1 ring-slate-700 focus:ring-2 focus:ring-yellow-500 outline-none transition-all text-white">
        </div>
        <div class="ninja-card p-4 rounded-2xl flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Dịch vụ</span>
                <span id="serviceName" class="text-sm font-bold text-yellow-500 uppercase">Đang tìm Urbox...</span>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Giá</span>
                <span id="servicePrice" class="block text-sm font-bold text-white">0đ</span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="ninja-card p-5 rounded-2xl text-center">
                <span class="text-[10px] text-slate-400 uppercase font-bold">Số ĐT</span>
                <div id="phoneNumber" onclick="copyToClipboard(this.innerText)" class="text-xl font-mono font-bold text-white mt-2 cursor-pointer">---</div>
            </div>
            <div class="ninja-card p-5 rounded-2xl text-center border-yellow-500/50 border">
                <span class="text-[10px] text-slate-400 uppercase font-bold">Mã OTP</span>
                <div id="otpCode" onclick="copyToClipboard(this.innerText)" class="text-3xl font-mono font-bold text-yellow-400 mt-1 cursor-pointer tracking-widest">------</div>
            </div>
        </div>
        <div class="space-y-3">
            <button onclick="getNewPhone()" id="btnPhone" disabled class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 text-white font-black py-5 rounded-2xl shadow-lg btn-press transition-all">🚀 LẤY SỐ MỚI</button>
            <button onclick="getOTP()" id="btnOTP" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-black py-5 rounded-2xl shadow-lg btn-press transition-all">📩 LẤY MÃ OTP</button>
        </div>
        <div id="status" class="text-center text-xs text-slate-500 font-medium py-2 rounded-full bg-slate-800/50">Nhập token để bắt đầu...</div>
    </div>

    <script>
        // Cầu nối thần thánh để bypass lỗi CORS
        const proxy = "https://api.allorigins.win/raw?url=";
        let currentRequestId = "";
        let urboxServiceId = "";

        function log(msg) { document.getElementById('status').innerText = msg; }

        async function fetchAPI(url) {
            const res = await fetch(proxy + encodeURIComponent(url));
            if (!res.ok) throw new Error('Network error');
            return await res.json();
        }

        async function initApi() {
            const token = document.getElementById('apiToken').value;
            if(!token) return;
            log("🕵️ Đang check tài khoản...");
            try {
                const dataBal = await fetchAPI(`https://api.viotp.com/users/balance?token=${token}`);
                if(dataBal.status_code === 200) {
                    document.getElementById('balanceText').innerText = "VND " + dataBal.data.balance.toLocaleString();
                    log("🔎 Đang tìm dịch vụ...");
                    const dataSer = await fetchAPI(`https://api.viotp.com/service/getv2?token=${token}&country=vn`);
                    const urbox = dataSer.data.find(s => s.name.toLowerCase().includes('urbox'));
                    if(urbox) {
                        urboxServiceId = urbox.id;
                        document.getElementById('serviceName').innerText = urbox.name;
                        document.getElementById('servicePrice').innerText = urbox.price + "đ";
                        document.getElementById('btnPhone').disabled = false;
                        log("✅ Sẵn sàng chiến!");
                    }
                } else { log("❌ Token không hợp lệ!"); }
            } catch (e) { log("❌ Lỗi kết nối (Thử lại sau 5s)"); }
        }

        async function getNewPhone() {
            const token = document.getElementById('apiToken').value;
            log("🔄 Đang bốc số Mobi/Vina...");
            try {
                const data = await fetchAPI(`https://api.viotp.com/request/getv2?token=${token}&serviceId=${urboxServiceId}&network=MOBIFONE|VINAPHONE`);
                if(data.status_code === 200) {
                    currentRequestId = data.data.request_id;
                    document.getElementById('phoneNumber').innerText = data.data.phone_number;
                    copyToClipboard(data.data.phone_number);
                    log("✅ Đã lấy số & Copy!");
                } else { log("❌ " + data.message); }
            } catch (e) { log("❌ Lỗi lấy số!"); }
        }

        async function getOTP() {
            const token = document.getElementById('apiToken').value;
            if(!currentRequestId) return log("❌ Cần lấy số trước!");
            log("⏳ Đang đợi OTP...");
            try {
                const data = await fetchAPI(`https://api.viotp.com/session/getv2?token=${token}&requestId=${currentRequestId}`);
                if(data.status_code === 200 && data.data.Code) {
                    document.getElementById('otpCode').innerText = data.data.Code;
                    copyToClipboard(data.data.Code);
                    log("🔥 HÚP OTP THÀNH CÔNG!");
                } else { log("🕒 Chưa có mã..."); }
            } catch (e) { log("❌ Lỗi check OTP!"); }
        }

        function copyToClipboard(text) {
            if(text.includes('-')) return;
            navigator.clipboard.writeText(text);
            log("📋 Đã copy: " + text);
        }
    </script>
</body>
</html>
